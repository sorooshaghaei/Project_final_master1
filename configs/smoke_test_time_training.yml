seed: 42

dataset:
  name: cifar10c
  root: data/raw/cifar10c
  corruption: shot_noise
  severity: 5
  batch_size: 32
  num_workers: 0
  max_samples: 64

model:
  backbone: resnet18
  num_classes: 10
  checkpoint: results/smoke/self_supervised/simclr_backbone.pt
  classifier_path: results/smoke/self_supervised/classifier.pt

adaptation:
  method: actmad
  steps_per_batch: 1
  lr: 0.0001
  source_stats_path: results/smoke/self_supervised/source_stats.pt
