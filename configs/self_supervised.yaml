seed: 42

dataset:
  name: cifar10
  root: data/raw
  download: true

model:
  backbone: resnet18
  projection_dim: 128

training:
  method: simclr
  epochs: 200
  batch_size: 256 # larger batch for better convergence
  lr: 0.03

source_stats:
  compute: true
  save_path: results/self_supervised/source_stats.pt

logging:
  classifier_path: results/self_supervised/classifier.pt
  save_backbone: true
  backbone_path: results/self_supervised/simclr_backbone.pt
