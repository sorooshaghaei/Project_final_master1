experiment_name: ssl_pretrain_early_stopping
seed: 42

dataset:
  name: cifar10
  root: data/raw
  download: true

model:
  backbone: resnet18
  embedding_dim: 128

training:
  method: simclr
  max_epochs: 50
  patience: 7
  min_delta: 0.001
  batch_size: 256
  lr: 0.03
  temperature: 0.5

source_stats:
  compute: true
  save_path: results/self_supervised/source_stats.pt
  loader: val

logging:
  output_dir: results/self_supervised
  save_backbone: true
  backbone_path: results/self_supervised/simclr_backbone.pt
  best_backbone_path: results/self_supervised/best_backbone.pt
  last_backbone_path: results/self_supervised/last_backbone.pt
  training_log_path: results/self_supervised/training_log.csv
