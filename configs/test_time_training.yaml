seed: 42

dataset:
  name: cifar10c
  root: data/raw/cifar10c
  corruption: shot_noise # try brightness, fog, frost, or gaussian_noise
  severity: 5
  batch_size: 16

model:
  backbone: resnet18
  num_classes: 10
  checkpoint: results/self_supervised/simclr_backbone.pt
  classifier_path: results/self_supervised/classifier.pt

adaptation:
  method: actmad
  steps_per_batch: 10
  lr: 0.0001
  source_stats_path: results/self_supervised/source_stats.pt
