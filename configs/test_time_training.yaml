experiment_name: ttt_actmad_cifar10c
seed: 42

dataset:
  name: cifar10c
  root: data/raw/cifar10c
  download: false
  allow_synthetic_fallback: true
  corruption: shot_noise
  corruptions:
    - gaussian_noise
    - shot_noise
    - fog
    - brightness
  severity: 5
  batch_size: 16
  num_workers: 0
  rotation_shift:
    enabled: false
    mode: random
    angles: [0, 90, 180, 270]
    fixed_angle: 90
    seed: 123

model:
  backbone: resnet18
  num_classes: 10
  checkpoint: results/self_supervised/best_backbone.pt

adaptation:
  method: actmad
  self_supervised_task: actmad
  steps_per_batch: 10
  lr: 0.0001
  source_stats_path: results/self_supervised/source_stats.pt

logging:
  output_dir: results/test_time_training
