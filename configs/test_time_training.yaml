experiment_name: ttt_baseline_rotation
seed: 42

dataset:
  name: cifar10c
  root: data/raw/cifar10c
  download: false
  corruption: shot_noise #brightness(-) #fog(+), frost(-), shot_noise(+), gaussian_noise(+)
  severity: 5
  batch_size: 16
  rotation_shift:
    enabled: false
    mode: random
    angles: [0, 90, 180, 270]
    fixed_angle: 90
    seed: 123

model:
  backbone: resnet18
  num_classes: 10
  checkpoint: results/self_supervised/simclr_backbone.pt

adaptation:
  method: actmad
  self_supervised_task: actmad
  steps_per_batch: 10
  lr: 0.0001
  source_stats_path: results/self_supervised/source_stats.pt

logging:
  output_dir: results/test_time_training